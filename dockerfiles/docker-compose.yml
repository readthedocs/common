volumes:
  build-user-builds:
  storage_data:
  storage_rustfs_data:
  postgres_data_16:
  postgres_backups_data:
  # Pre-built runner venv + uv-managed Python for the
  # isolated-builder service. Populated by that service's entrypoint
  # at compose-up time (idempotent — fast on subsequent restarts) and
  # bind-mounted into each build container the worker spawns. We use
  # named volumes (instead of bind-mounted host paths) so the host
  # docker daemon owns the storage, which lets the worker reference
  # them by name (``community_runner-venv`` / ``community_uv-python``)
  # when it does ``docker run -v ...``.
  runner-venv:
  uv-python:

services:

  server:
    # Image used for all the other services (proxito, web, celery, build)
    build:
      context: ${PWD}
      dockerfile: ${PWD}/dockerfiles/Dockerfile
      args:
        PRUNE_PYTHON_PACKAGE_CACHE: ${PRUNE_PYTHON_PACKAGE_CACHE:-0}

  nginx:
    stop_grace_period: 1s
    image: nginx:1.22
    ports:
      - "80:80"
    links:
      - web
      - proxito
      - storage
      - wrangler
    networks:
      readthedocs:
    volumes:
      - ${PWD}/dockerfiles/nginx:/etc/nginx/templates
    # Disable logs for NGINX by default because they are too noisy and we have
    # better logs in our application code
    logging:
      driver: "none"

  wrangler:
    stop_grace_period: 1s
    build:
      context: ${PWD}/common/packages/addons-inject/
      dockerfile: ${PWD}/common/packages/addons-inject/Dockerfile
    volumes:
      - ${PWD}/common/packages/addons-inject/index.js:/usr/src/app/packages/addons-inject/index.js
      - ${PWD}/common/packages/addons-inject/wrangler.toml:/usr/src/app/packages/addons-inject/wrangler.toml
    networks:
      readthedocs:
    working_dir: /usr/src/app/packages/addons-inject/
    command: [
      "node_modules/.bin/wrangler",
      "dev",
      "--log-level=info",
      "--host=nginx:8080",  # El Proxito on NGINX configuration
      "--ip=0.0.0.0",
      "--port=8000",
    ]

  addons:
    stop_grace_period: 1s
    build:
      context: ${PWD}/${RTDDEV_PATH_ADDONS:-../addons}
      dockerfile: ${PWD}/common/dockerfiles/Dockerfile.addons
    networks:
      readthedocs:
    volumes:
      - ${PWD}/${RTDDEV_PATH_ADDONS:-../addons}/src/:/usr/src/app/checkouts/addons/src/
      - ${PWD}/${RTDDEV_PATH_ADDONS:-../addons}/package.json:/usr/src/app/checkouts/addons/package.json
      - ${PWD}/${RTDDEV_PATH_ADDONS:-../addons}/package-lock.json:/usr/src/app/checkouts/addons/package-lock.json
      - ${PWD}/${RTDDEV_PATH_ADDONS:-../addons}/webpack.config.js:/usr/src/app/checkouts/addons/webpack.config.js
    tty: true
    working_dir: /usr/src/app/checkouts/addons/
    ports:
      - "8000:8000"
    command: [
      "npm",
      "run",
      "dev",
    ]

  proxito:
    stop_grace_period: 1s
    volumes:
      - ${PWD}/common/dockerfiles/entrypoints/common.sh:/usr/src/app/docker/common.sh
      - ${PWD}/common/dockerfiles/entrypoints/proxito.sh:/usr/src/app/docker/proxito.sh
      - ${PWD}/${RTDDEV_PATH_EXT:-../readthedocs-ext}:/usr/src/app/checkouts/readthedocs-ext
      - ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}:/usr/src/app/checkouts/ext-theme
      - ${PWD}/common/dockerfiles/nodemon.json:/usr/src/app/checkouts/nodemon.json
    links:
      - storage
      - database
      - cache
    environment:
      - DOCKER_NO_RELOAD
      - RTD_USE_PROMOS
      - RTD_PRODUCTION_DOMAIN
      - RTD_PUBLIC_DOMAIN
      - RTD_LOGGING_LEVEL
      - RTD_DJANGO_DEBUG
      - RTD_EXT_THEME_DEV_SERVER_ENABLED
      - RTD_FILETREEDIFF_ALL
      # AWS related settings.
      - RTD_S3_PROVIDER
      - RTD_AWS_ACCESS_KEY_ID
      - RTD_AWS_SECRET_ACCESS_KEY
      - RTD_AWS_STS_ASSUME_ROLE_ARN
      - RTD_S3_MEDIA_STORAGE_BUCKET
      - RTD_S3_BUILD_COMMANDS_STORAGE_BUCKET
      - RTD_S3_BUILD_TOOLS_STORAGE_BUCKET
      - RTD_S3_STATIC_STORAGE_BUCKET
      - RTD_AWS_S3_REGION_NAME

    # Allow us to run `docker attach readthedocsorg_proxito_1` and get
    # control on STDIN and be able to debug our code with interactive pdb
    stdin_open: true
    tty: true

    networks:
      readthedocs:
    command: ["../../docker/proxito.sh"]

  web:
    stop_grace_period: 1s
    volumes:
      - ${PWD}/common/dockerfiles/scripts/createsuperuser.py:/usr/src/app/docker/createsuperuser.py
      - ${PWD}/common/dockerfiles/entrypoints/common.sh:/usr/src/app/docker/common.sh
      - ${PWD}/common/dockerfiles/entrypoints/web.sh:/usr/src/app/docker/web.sh
      - ${PWD}/common/dockerfiles/entrypoints/createbuckets.sh:/usr/src/app/docker/createbuckets.sh
      - ${PWD}/common/dockerfiles/entrypoints/wait-for-it.sh:/usr/src/app/docker/wait-for-it.sh
      - ${PWD}/common/dockerfiles/nodemon.json:/usr/src/app/checkouts/nodemon.json
      - ${PWD}/${RTDDEV_PATH_EXT:-../readthedocs-ext}:/usr/src/app/checkouts/readthedocs-ext
      - ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}:/usr/src/app/checkouts/ext-theme

      # Docker in Docker: cancel running builds.
      - /var/run/docker.sock:/var/run/docker.sock
    links:
      - storage
      - database
      - cache
    depends_on:
      - storage
    environment:
      - INIT=${INIT:-}
      - DOCKER_NO_RELOAD
      - RTD_EXT_THEME_DEV_SERVER_ENABLED
      - RTD_PRODUCTION_DOMAIN
      - RTD_PUBLIC_DOMAIN
      - RUSTFS_ROOT_USER=admin
      - RUSTFS_ROOT_PASSWORD=password
      - RTD_LOGGING_LEVEL
      - RTD_DJANGO_DEBUG
      - RTD_GITHUB_APP_ID
      - RTD_GITHUB_APP_NAME
      - RTD_GITHUB_APP_WEBHOOK_SECRET
      - RTD_GITHUB_APP_PRIVATE_KEY
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUB_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUB_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUBAPP_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUBAPP_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_GITLAB_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GITLAB_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_BITBUCKET_OAUTH2_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_BITBUCKET_OAUTH2_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_GOOGLE_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GOOGLE_SECRET
      - RTD_FILETREEDIFF_ALL
      # AWS related settings.
      - RTD_S3_PROVIDER
      - RTD_AWS_ACCESS_KEY_ID
      - RTD_AWS_SECRET_ACCESS_KEY
      - RTD_AWS_STS_ASSUME_ROLE_ARN
      - RTD_S3_MEDIA_STORAGE_BUCKET
      - RTD_S3_BUILD_COMMANDS_STORAGE_BUCKET
      - RTD_S3_BUILD_TOOLS_STORAGE_BUCKET
      - RTD_S3_STATIC_STORAGE_BUCKET
      - RTD_AWS_S3_REGION_NAME
      - RTD_OPENAI_API_KEY
    stdin_open: true
    tty: true
    networks:
      readthedocs:
    command: ["../../docker/wait-for-it.sh", "database:5432", "--timeout=60", "--strict", "--", "../../docker/web.sh"]

  webpack:
    build:
      context: ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}
      dockerfile: ${PWD}/common/dockerfiles/Dockerfile.webpack
    working_dir: /usr/src/app/checkouts/ext-theme
    ports:
      - "10001:10001"
    volumes:
      - ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}/src:/usr/src/app/checkouts/ext-theme/src
      - ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}/readthedocsext:/usr/src/app/checkouts/ext-theme/readthedocsext
      - ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}/package.json:/usr/src/app/checkouts/ext-theme/package.json
      - ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}/package-lock.json:/usr/src/app/checkouts/ext-theme/package-lock.json
      - ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}/webpack.config.mjs:/usr/src/app/checkouts/ext-theme/webpack.config.mjs
    environment:
      - INIT=${INIT:-}
      - DOCKER_NO_RELOAD
      - NODE_ENV=development
      - RTD_EXT_THEME_DEV_SERVER_ENABLED
    stdin_open: true
    tty: true
    networks:
      readthedocs:
    command: [
      "./node_modules/.bin/webpack-dev-server",
      "--mode=development",
      "--host=0.0.0.0",
      "--port=10001",
    ]

  celery:
    stop_grace_period: 1s
    volumes:
      - ${PWD}/common/dockerfiles/entrypoints/common.sh:/usr/src/app/docker/common.sh
      - ${PWD}/common/dockerfiles/entrypoints/celery.sh:/usr/src/app/docker/celery.sh
      - ${PWD}/common/dockerfiles/entrypoints/wait-for-it.sh:/usr/src/app/docker/wait-for-it.sh
      - ${PWD}/common/dockerfiles/nodemon.json:/usr/src/app/checkouts/nodemon.json
      - ${PWD}/${RTDDEV_PATH_EXT:-../readthedocs-ext}:/usr/src/app/checkouts/readthedocs-ext
      - ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}:/usr/src/app/checkouts/ext-theme

      # Docker in Docker: Fargate (call `docker run` from inside `web` queue)
      - /var/run/docker.sock:/var/run/docker.sock
    links:
      - storage
      - database
      - cache
    depends_on:
      - storage
    environment:
      # If COLUMNS is not defined Celery fails at startup
      # https://github.com/celery/celery/issues/5761
      - COLUMNS=80
      - DOCKER_NO_RELOAD
      - CELERY_LOG_LEVEL=${CELERY_LOG_LEVEL:-INFO}
      - RTD_PRODUCTION_DOMAIN
      - RTD_PUBLIC_DOMAIN
      - RTD_LOGGING_LEVEL
      - RTD_DJANGO_DEBUG
      - RTD_GITHUB_APP_ID
      - RTD_GITHUB_APP_NAME
      - RTD_GITHUB_APP_WEBHOOK_SECRET
      - RTD_GITHUB_APP_PRIVATE_KEY
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUB_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUB_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUBAPP_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUBAPP_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_GITLAB_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GITLAB_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_BITBUCKET_OAUTH2_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_BITBUCKET_OAUTH2_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_GOOGLE_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GOOGLE_SECRET
      - RTD_FILETREEDIFF_ALL
      # AWS related settings.
      - RTD_S3_PROVIDER
      - RTD_AWS_ACCESS_KEY_ID
      - RTD_AWS_SECRET_ACCESS_KEY
      - RTD_AWS_STS_ASSUME_ROLE_ARN
      - RTD_S3_MEDIA_STORAGE_BUCKET
      - RTD_S3_BUILD_COMMANDS_STORAGE_BUCKET
      - RTD_S3_BUILD_TOOLS_STORAGE_BUCKET
      - RTD_S3_STATIC_STORAGE_BUCKET
      - RTD_AWS_S3_REGION_NAME
      - RTD_OPENAI_API_KEY
      - RTD_BUILDER_TOKEN
    stdin_open: true
    tty: true
    networks:
      readthedocs:
    command: ["../../docker/celery.sh"]

  celery-beat:
    stop_grace_period: 1s
    volumes:
      - ${PWD}/common/dockerfiles/entrypoints/common.sh:/usr/src/app/docker/common.sh
      - ${PWD}/common/dockerfiles/entrypoints/celery-beat.sh:/usr/src/app/docker/celery-beat.sh
      - ${PWD}/common/dockerfiles/nodemon.json:/usr/src/app/checkouts/nodemon.json
      - ${PWD}/${RTDDEV_PATH_EXT:-../readthedocs-ext}:/usr/src/app/checkouts/readthedocs-ext
      - ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}:/usr/src/app/checkouts/ext-theme
    links:
      - cache
    environment:
      - DOCKER_NO_RELOAD
      - CELERY_LOG_LEVEL=${CELERY_LOG_LEVEL:-INFO}
      - RTD_PRODUCTION_DOMAIN
      - RTD_PUBLIC_DOMAIN
      - RTD_LOGGING_LEVEL
      - RTD_DJANGO_DEBUG
      - RTD_GITHUB_APP_ID
      - RTD_GITHUB_APP_NAME
      - RTD_GITHUB_APP_WEBHOOK_SECRET
      - RTD_GITHUB_APP_PRIVATE_KEY
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUB_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUB_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUBAPP_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GITHUBAPP_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_GITLAB_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GITLAB_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_BITBUCKET_OAUTH2_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_BITBUCKET_OAUTH2_SECRET
      - RTD_SOCIALACCOUNT_PROVIDERS_GOOGLE_CLIENT_ID
      - RTD_SOCIALACCOUNT_PROVIDERS_GOOGLE_SECRET
      - RTD_FILETREEDIFF_ALL
      # AWS related settings.
      - RTD_S3_PROVIDER
      - RTD_AWS_ACCESS_KEY_ID
      - RTD_AWS_SECRET_ACCESS_KEY
      - RTD_AWS_STS_ASSUME_ROLE_ARN
      - RTD_S3_MEDIA_STORAGE_BUCKET
      - RTD_S3_BUILD_COMMANDS_STORAGE_BUCKET
      - RTD_S3_BUILD_TOOLS_STORAGE_BUCKET
      - RTD_S3_STATIC_STORAGE_BUCKET
      - RTD_AWS_S3_REGION_NAME
      - RTD_OPENAI_API_KEY
    stdin_open: true
    tty: true
    networks:
      readthedocs:
    command: ["../../docker/celery-beat.sh"]

  build:
    stop_grace_period: 1s
    volumes:
      - ${PWD}/common/dockerfiles/entrypoints/common.sh:/usr/src/app/docker/common.sh
      - ${PWD}/common/dockerfiles/entrypoints/build.sh:/usr/src/app/docker/build.sh
      - ${PWD}/common/dockerfiles/nodemon.json:/usr/src/app/checkouts/nodemon.json
      - ${PWD}/${RTDDEV_PATH_EXT:-../readthedocs-ext}:/usr/src/app/checkouts/readthedocs-ext
      - ${PWD}/${RTDDEV_PATH_EXT_THEME:-../ext-theme}:/usr/src/app/checkouts/ext-theme

      # The python code at readthedocs/doc_builder/environments.py
      # mounts `self.project.doc_path`. We need to share this path
      # between the build container (git commands), and the container that
      # is created inside the build container (sphinx commands).
      # Because of this, we need to use a shared volume between them
      - build-user-builds:/usr/src/app/checkouts/readthedocs.org/user_builds

      # Docker in Docker: old implementation (`build-default` queue)
      - /var/run/docker.sock:/var/run/docker.sock
    links:
      - web
      - storage
      - cache
    environment:
      # If COLUMNS is not defined Celery fails at startup
      # https://github.com/celery/celery/issues/5761
      - COLUMNS=80
      - DOCKER_NO_RELOAD
      - CELERY_LOG_LEVEL=${CELERY_LOG_LEVEL:-INFO}
      - RTD_PRODUCTION_DOMAIN
      - RTD_PUBLIC_DOMAIN
      - RTD_LOGGING_LEVEL
      - RTD_DJANGO_DEBUG
      - RTD_FILETREEDIFF_ALL
      # TODO: remove these from here, as builders should not
      # need to have these settings.
      # AWS related settings.
      - RTD_S3_PROVIDER
      - RTD_AWS_ACCESS_KEY_ID
      - RTD_AWS_SECRET_ACCESS_KEY
      - RTD_AWS_STS_ASSUME_ROLE_ARN
      - RTD_S3_MEDIA_STORAGE_BUCKET
      - RTD_S3_BUILD_COMMANDS_STORAGE_BUCKET
      - RTD_S3_BUILD_TOOLS_STORAGE_BUCKET
      - RTD_S3_STATIC_STORAGE_BUCKET
      - RTD_AWS_S3_REGION_NAME
    stdin_open: true
    tty: true
    networks:
      readthedocs:
    command: ["../../docker/build.sh"]

  isolated-builder:
    # Dev emulation of the production isolated-builders AMI. Picks up
    # tasks from the ``isolated-builds`` queue and spawns build
    # containers on the host docker daemon (via the bind-mounted
    # socket). The companion entrypoint clones readthedocs-builder (or
    # skips if the host's checkout is bind-mounted in), creates the
    # worker venv via uv, then runs Celery — no systemd, no New Relic,
    # no Sentry. See readthedocs-builder/docs/architecture.md.
    stop_grace_period: 1s
    build:
      context: ${PWD}
      dockerfile: ${PWD}/dockerfiles/Dockerfile.isolated-builder
    volumes:
      # Host's readthedocs-builder checkout. The entrypoint sees the
      # mount as populated and skips ``git clone`` so you can iterate
      # on the runner / worker code by editing on the host and
      # restarting the container.
      - ${PWD}/${RTDDEV_PATH_BUILDER:-../readthedocs-builder}:/opt/readthedocs-builder

      # Runner venv + uv-managed Python (named volumes, see top of
      # this file). The entrypoint populates both via ``uv sync
      # --python 3.12 --python-preference=only-managed``; the worker
      # then bind-mounts them into each build container by the volume
      # names ``community_runner-venv`` / ``community_uv-python``
      # (passed through RTD_HOST_*_PATH below).
      - runner-venv:/opt/runner-venv
      - uv-python:/opt/uv-python

      # The entrypoint script itself, bind-mounted so edits don't
      # need a rebuild (matches how celery.sh / build.sh wire up).
      - ${PWD}/common/dockerfiles/entrypoints/isolated-builder.sh:/usr/src/app/docker/isolated-builder.sh

      # docker-out-of-docker: the worker calls ``docker run`` against
      # the host daemon to spawn build containers.
      - /var/run/docker.sock:/var/run/docker.sock
    links:
      - cache
      - storage
      - web
    environment:
      - RTD_BROKER_URL=redis://:redispassword@cache:6379/0
      - RTD_BUILDS_QUEUE=isolated-builds
      - RTD_BUILDER_REF=celery-on-ec2
      # Source path the worker passes to ``docker run -v ...`` when
      # spawning build containers. Must be a HOST-visible path because
      # the daemon resolves it on the host. ``${PWD}`` here is the
      # host's CWD (where ``docker compose`` runs), so this resolves
      # to the same checkout the bind-mount above points at.
      - RTD_HOST_BUILDER_PATH=${PWD}/${RTDDEV_PATH_BUILDER:-../readthedocs-builder}
      # Runner venv + managed Python install: host-daemon-recognized
      # names of the named volumes defined at the top of this file.
      # Compose prefixes volume names with the project (``community``
      # for the default community-edition project). The worker passes
      # these as ``-v <name>:<path>:ro`` and the daemon resolves them
      # as named-volume mounts.
      - RTD_HOST_RUNNER_VENV_PATH=community_runner-venv
      - RTD_HOST_PYTHON_INSTALL_PATH=community_uv-python
      # Have build containers join the compose network so they can
      # reach the API at ``http://web`` via service-name DNS.
      - RTD_BUILD_NETWORK=community_readthedocs
    stdin_open: true
    tty: true
    networks:
      readthedocs:
    command: ["/usr/src/app/docker/isolated-builder.sh"]

  cache:
    image: redis:6.2.6  # Match production version
    command: >
          --requirepass "redispassword"
    networks:
      readthedocs:

  database:
    image: postgres:16.3
    environment:
      - POSTGRES_USER=docs_user
      - POSTGRES_PASSWORD=docs_pwd
      - POSTGRES_DB=docs_db
    volumes:
      - ${PWD}/common/dockerfiles/entrypoints/postgres.sql:/docker-entrypoint-initdb.d/postgres.sql
      - postgres_data_16:/var/lib/postgresql/data
      - postgres_backups_data:/backups
    networks:
      readthedocs:

  storage:
    image: rustfs/rustfs:1.0.0-alpha.83
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_ADDRESS=:9000
      - RUSTFS_ACCESS_KEY=admin
      - RUSTFS_SECRET_KEY=password
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - storage_rustfs_data:/data
    networks:
      readthedocs:
