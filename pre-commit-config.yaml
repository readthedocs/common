# This file is used in both core application repos (.org and corporate)

exclude: '^$|settings|scripts|vendor|\.(min\.js|svg)$|static/.*\.js$'
fail_fast: false
repos:

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    # Disabled because yapf is better for our purpose
    # - id: autopep8-wrapper
    - id: check-added-large-files
    - id: check-ast
      language_version: python3.14
    - id: check-case-conflict
    - id: check-executables-have-shebangs
    - id: check-json
    - id: check-shebang-scripts-are-executable
    - id: check-toml
    - id: check-vcs-permalinks
    - id: debug-statements
      language_version: python3.14
    - id: fix-byte-order-marker
    - id: end-of-file-fixer
    # `fix-encoding-pragma` was removed in pre-commit-hooks v6.0.0;
    # its behavior is now covered by ruff's `UP009` rule (see .ruff.toml).
    - id: check-merge-conflict
    - id: check-symlinks
    - id: trailing-whitespace
      exclude: |
        (?x)^(
            docs/.+/locale/.*\.po|
            .+\.svg|
            .+\.js|
            .+\.css|
            .*/migrations/.*|
        )$
    - id: mixed-line-ending
      args: ['--fix=lf']

- repo: https://github.com/adamchainz/django-upgrade
  rev: "1.31.1"
  hooks:
  - id: django-upgrade
    args: [--target-version, "5.2"]

- repo: https://github.com/asottile/blacken-docs
  rev: 1.20.0
  hooks:
    - id: blacken-docs
      additional_dependencies: [black==23.7.0]

- repo: https://github.com/aspiredu/django-safemigrate
  rev: "6.0"
  hooks:
    - id: check

- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.20
  hooks:
    # Run the linter.
    - id: ruff
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format

- repo: https://github.com/errata-ai/vale
  rev: v3.15.1
  hooks:
    - id: vale
      exclude: '^CHANGELOG\.rst$|^AUTHORS.rst|README\.rst$'

- repo: https://github.com/sphinx-contrib/sphinx-lint
  rev: v1.0.2
  hooks:
    - id: sphinx-lint
